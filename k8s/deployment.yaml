apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-coach
  namespace: k8s-coach
  labels:
    app: k8s-coach
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-coach
  template:
    metadata:
      labels:
        app: k8s-coach
    spec:
      containers:
        - name: app
          image: k8s-coach:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
