<!doctype html>
<html lang="zh-Hant" xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="k8s-sidebar" th:fragment="sidebar">
    <a class="sidebar-home" href="/">回首頁</a>
    <div class="sidebar-heading">
        <strong>Kubernetes 教學</strong>
        <span>左側切換主題，右側閱讀內容</span>
    </div>

    <nav class="sidebar-nav" aria-label="Kubernetes 教學導覽">
        <section class="sidebar-section" th:each="section : ${navSections}">
            <h2 th:text="${section.title}">先看整體</h2>
            <a class="sidebar-link"
               th:each="page : ${section.pages}"
               th:href="${page.href}"
               th:classappend="${currentPath == page.href} ? ' active'"
               th:attr="aria-current=${currentPath == page.href ? 'page' : null}">
                <span th:text="${page.title}">K8s 總覽</span>
                <small th:text="${page.summary}">整體地圖</small>
            </a>
        </section>
    </nav>

    <div class="sidebar-planned" aria-label="後續預留主題">
        <strong>後續預留主題</strong>
        <p>未來新增功能會放在左側導覽，不再塞進同一區塊。</p>
        <div>
            <span th:each="topic : ${plannedTopics}" th:text="${topic}">Ingress</span>
        </div>
    </div>
</aside>
</body>
</html>
